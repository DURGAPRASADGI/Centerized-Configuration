  datasource:
    # JDBC URL format: jdbc:postgresql://<host>:<port>/<database_name>
    url: jdbc:postgresql://localhost:5432/microservice
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' automatically creates/updates tables. Use 'validate' for production.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # Specifies the PostgreSQL dialect for optimized SQL generation
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port: 8081
